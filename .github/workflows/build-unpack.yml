name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle (force 8.5)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'          # 关键：固定使用 Gradle 8.5
          cache-overwrite-existing: true  # 避免缓存冲突

      - name: Build freeDebug APK
        run: gradle assembleFreeDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          path: app/build/outputs/apk/free/debug/*.apk
          retention-days: 7